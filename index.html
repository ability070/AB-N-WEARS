<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AB&N WEARS | Premium Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#000;
  color:white;
}

/* PREMIUM HEADER (GLASS EFFECT) */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:99999;

  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,215,0,0.2);
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:22px;
  color:gold;
  letter-spacing:1px;
}

/* PREMIUM CART BADGE */
#cartIcon{
  position:relative;
  cursor:pointer;
  font-size:22px;
  color:gold;
  background:rgba(0,0,0,0.8);
  border:1px solid gold;
  padding:6px 12px;
  border-radius:30px;
  display:flex;
  gap:6px;
  align-items:center;
}

#count{
  background:gold;
  color:black;
  padding:2px 7px;
  border-radius:50%;
  font-size:12px;
  font-weight:bold;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  margin-top:70px;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.hero h1{
  font-size:26px;
  color:gold;
}

/* PRODUCTS */
.products{
  padding:40px 15px;
  background:#0a0a0a;
}

.products h2{
  text-align:center;
  color:gold;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
}

/* PREMIUM CARD */
.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,215,0,0.3);
  border-radius:12px;
  overflow:hidden;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:gold;
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}

.card h4{
  margin:5px;
}

.price{
  color:gold;
  font-weight:bold;
}

/* BUTTON */
button{
  background:gold;
  border:none;
  padding:7px 10px;
  margin:5px;
  cursor:pointer;
  font-weight:bold;
  border-radius:6px;
}

/* CART DRAWER */
#cart{
  position:fixed;
  top:0;
  right:-100%;
  width:85%;
  height:100%;
  background:#0f0f0f;
  padding:20px;
  transition:0.3s ease;
  overflow:auto;
  z-index:999999;
  border-left:1px solid gold;
}

#cart h2{
  color:gold;
}

/* REVIEWS */
.reviews{
  padding:60px 20px;
  text-align:center;
}

.review-slide{
  display:none;
  font-style:italic;
  max-width:300px;
  margin:auto;
}

.review-slide.active{
  display:block;
}

.hero-content h1{
  font-size:28px;
  color:gold;
  font-family:'Playfair Display',serif;
  margin-bottom:10px;
}

.hero-content p{
  font-size:14px;
  color:#ddd;
  letter-spacing:1px;
}

</style>

</head>

<body>

<header>
  <div class="logo">AB&N WEARS</div>

  <div id="cartIcon">
    🛒 <span id="count">0</span>
  </div>
</header>

<!-- HERO -->

<section class="hero">
  <div class="hero-content">
    <h1>LUXURY BIG BOYS SENATOR COLLECTION</h1>
    <p>Premium Tailoring for Kings.</p>
  </div>
</section>

<!-- PRODUCTS -->

<section class="products">
  <h2>Our Collection</h2>
  <div id="productList" class="grid"></div>
</section>

<!-- REVIEWS -->

<section class="reviews">
  <h2>What Clients Say</h2>

  <div class="review-slide active">"Best tailoring in Nigeria!"</div>
  <div class="review-slide">"Luxury at its peak."</div>
  <div class="review-slide">"Perfect fit always."</div>
</section>

<!-- CART -->

<div id="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>

  <h3>Total: ₦<span id="total">0</span></h3>

<button onclick="checkout()">Checkout</button> <button onclick="closeCart()">Close</button>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const productList = document.getElementById("productList");

/* RENDER PRODUCTS */
function renderProducts(){
  productList.innerHTML = "";

  if(products.length === 0){
    productList.innerHTML = "<p style='color:white'>No products yet</p>";
    return;
  }

  products.forEach((p,i)=>{
    productList.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h4>${p.name}</h4>
        <div class="price">₦${p.price}</div>
        <button onclick="addToCart(${i})">Add To Cart</button>
      </div>
    `;
  });
}

renderProducts();

/* ADD TO CART */
function addToCart(i){
  let p = products[i];

  let exist = cart.find(x => x.name === p.name);

  if(exist){
    exist.qty++;
  } else {
    cart.push({...p, qty:1});
  }

  saveCart();
  openCart();
}

/* SAVE */
function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

/* UPDATE CART */
function updateCart(){
  let cartItems = document.getElementById("cartItems");
  let total = 0;
  let count = 0;

  cartItems.innerHTML = "";

  cart.forEach((item,i)=>{
    total += item.price * item.qty;
    count += item.qty;

    cartItems.innerHTML += `
      <div>
        ${item.name}<br>
        ₦${item.price} x ${item.qty}<br>
        <button onclick="changeQty(${i},1)">+</button>
        <button onclick="changeQty(${i},-1)">-</button>
        <button onclick="removeItem(${i})">Remove</button>
        <hr>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = count;
}

/* CART ACTIONS */
function changeQty(i,c){
  cart[i].qty += c;
  if(cart[i].qty <= 0) cart.splice(i,1);
  saveCart();
}

function removeItem(i){
  cart.splice(i,1);
  saveCart();
}

/* CART OPEN */
document.getElementById("cartIcon").onclick = openCart;

function openCart(){
  document.getElementById("cart").style.right = "0";
}

function closeCart(){
  document.getElementById("cart").style.right = "-100%";
}

/* CHECKOUT */
function checkout(){
  let name = prompt("Name");
  let phone = prompt("Phone");

  let total = cart.reduce((a,b)=>a + b.price*b.qty,0);

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  orders.push({name, phone, total, cart});

  localStorage.setItem("orders", JSON.stringify(orders));

  alert("Order placed!");

  cart = [];
  saveCart();
  closeCart();
}

/* INIT */
updateCart();

/* REVIEWS */
let slides = document.querySelectorAll(".review-slide");
let index = 0;

setInterval(()=>{
  slides.forEach(s=>s.classList.remove("active"));
  slides[index].classList.add("active");
  index = (index+1)%slides.length;
},3000);

</script>

</body>
</html>
