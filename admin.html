<!DOCTYPE html>
<html>
<head>
  <title>ABN Admin Dashboard</title>

  <style>
    body{
      font-family: Arial;
      background:#111;
      color:white;
      margin:0;
      padding:20px;
    }

    h1{ color:gold; }

    .hidden{ display:none; }

    .form, .box{
      background:#000;
      padding:15px;
      border:1px solid gold;
      margin-bottom:20px;
      border-radius:10px;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin:5px 0;
      border:none;
    }

    button{
      background:gold;
      border:none;
      padding:10px;
      cursor:pointer;
      margin-top:5px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:15px;
    }

    .card{
      background:#000;
      border:1px solid gold;
      padding:10px;
      border-radius:10px;
    }

    img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .login{
      max-width:300px;
      margin:100px auto;
      text-align:center;
    }
  </style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginBox" class="login">
  <h2 style="color:gold;">Admin Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard" class="hidden">

<h1>🛠 ABN Admin Dashboard</h1>

<!-- PRODUCT FORM -->
<div class="form">
  <h3>Add Product</h3>

  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price">
  <textarea id="desc" placeholder="Description"></textarea>

  <input type="file" id="image">

  <button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS -->
<h2>Products</h2>
<div id="products" class="grid"></div>

<!-- ORDERS -->
<h2>Orders</h2>
<div id="orders" class="grid"></div>

</div>

<script>
/* ================= ADMIN LOGIN ================= */
const ADMIN_USER = "admin";
const ADMIN_PASS = "1234";

function login(){
  let u = user.value;
  let p = pass.value;

  if(u === ADMIN_USER && p === ADMIN_PASS){
    loginBox.classList.add("hidden");
    dashboard.classList.remove("hidden");
    loadProducts();
    loadOrders();
  } else {
    alert("Wrong login");
  }
}

/* ================= CLOUD IMAGE UPLOAD ================= */
async function uploadImage(file){
  let form = new FormData();
  form.append("file", file);
  form.append("upload_preset", "YOUR_UPLOAD_PRESET");

  let res = await fetch(
    "https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/image/upload",
    { method:"POST", body:form }
  );

  let data = await res.json();
  return data.secure_url;
}

/* ================= PRODUCTS ================= */
let products = JSON.parse(localStorage.getItem("products")) || [];

async function addProduct(){

  let file = image.files[0];
  if(!file){
    alert("Select image");
    return;
  }

  let imageUrl = await uploadImage(file);

  let product = {
    name: name.value,
    price: price.value,
    desc: desc.value,
    image: imageUrl
  };

  products.push(product);
  localStorage.setItem("products", JSON.stringify(products));

  loadProducts();
}

/* DISPLAY PRODUCTS */
function loadProducts(){
  let box = document.getElementById("products");
  box.innerHTML = "";

  products.forEach((p,i)=>{
    box.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>₦${p.price}</p>
        <p>${p.desc}</p>
        <button onclick="deleteProduct(${i})">Delete</button>
      </div>
    `;
  });
}

function deleteProduct(i){
  products.splice(i,1);
  localStorage.setItem("products", JSON.stringify(products));
  loadProducts();
}

/* ================= ORDERS ================= */
let orders = JSON.parse(localStorage.getItem("orders")) || [];

function loadOrders(){
  let box = document.getElementById("orders");
  box.innerHTML = "";

  orders.forEach((o,i)=>{
    box.innerHTML += `
      <div class="card">
        <h3>${o.name}</h3>
        <p>${o.phone}</p>
        <p>${o.address}</p>
        <p>Total: ₦${o.total}</p>
        <button onclick="deleteOrder(${i})">Delete</button>
      </div>
    `;
  });
}

function deleteOrder(i){
  orders.splice(i,1);
  localStorage.setItem("orders", JSON.stringify(orders));
  loadOrders();
}
</script>

</body>
</html>
